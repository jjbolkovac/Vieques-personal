<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Vieques — Island Tour</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{--sun:#FFD93D;--coral:#FF6B6B;--ink:#102028;--muted:#5c7680}
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto}

#wrap{display:grid;grid-template-columns:340px 1fr;height:100%}
#sidebar{background:#fff;border-right:4px solid var(--sun);overflow:auto}
#map{height:100%}

header{padding:14px 16px;border-bottom:1px solid #eee}
header h1{margin:0;font-size:18px}
header p{margin:6px 0 0;color:var(--muted);font-size:12px;font-weight:700}

.list{padding:10px}
.item{display:flex;gap:10px;border:1px solid #eee;border-radius:12px;padding:10px;margin-bottom:8px;cursor:pointer}
.item:hover{background:#f7fbff}
.item.selected{outline:3px solid rgba(0,0,0,.08)}

.num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
font-weight:900;color:#fff;border:3px solid #fff;box-shadow:0 6px 14px rgba(0,0,0,.18)}
.beach{background:#0096C7}
.nature{background:#1A7A4A}
.bio{background:#06D6A0}
.history{background:#E07B54}
.home{background:#9B59B6}

.name{font-weight:900;font-size:13px}
.tag{font-size:12px;color:var(--muted);font-weight:700}

/* MAP MARKERS */
.mk{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#fff;border:3px solid #fff;
  box-shadow:0 6px 16px rgba(0,0,0,.25)
}
.mk.beach{background:#0096C7}
.mk.nature{background:#1A7A4A}
.mk.bio{background:#06D6A0}
.mk.history{background:#E07B54}
.mk.home{background:#9B59B6}
.mk.sel{outline:4px solid rgba(255,217,61,.95)}

@keyframes bounce{
  0%{transform:translateY(0)}
  30%{transform:translateY(-16px)}
  50%{transform:translateY(0)}
  70%{transform:translateY(-8px)}
  100%{transform:translateY(0)}
}
.mk.bounce{animation:bounce .6s ease}

/* DRAWER */
#detail{
  position:fixed;top:0;right:0;width:380px;height:100%;
  background:#fff;transform:translateX(100%);
  transition:transform .35s ease;
  box-shadow:-10px 0 30px rgba(0,0,0,.25);
  z-index:999;overflow:auto
}
#detail.open{transform:translateX(0)}
#close-detail{
  position:absolute;top:12px;right:12px;
  background:var(--coral);color:#fff;border:none;
  width:34px;height:34px;border-radius:50%;
  font-weight:900;cursor:pointer
}

.hero{padding:18px;border-bottom:3px dashed #eee}
.hero-top{display:flex;gap:10px}
.hero-num{
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#fff;border:3px solid #fff
}
.hero-num.beach{background:#0096C7}
.hero-num.nature{background:#1A7A4A}
.hero-num.bio{background:#06D6A0}
.hero-num.history{background:#E07B54}
.hero-num.home{background:#9B59B6}

.hero-name{font-size:22px;font-weight:900}
.hero-tag{font-size:14px;color:#555;font-style:italic}

.section{padding:14px;border-bottom:1px dashed #eee}
.section h3{font-size:11px;text-transform:uppercase;color:var(--muted)}
.section p{font-size:14px;line-height:1.6}
</style>
</head>

<body>
<div id="wrap">
  <div id="sidebar">
    <header>
      <h1>Vieques — Island Tour</h1>
      <p>All stops · numbered · interactive</p>
    </header>
    <div class="list" id="list"></div>
  </div>
  <div id="map"></div>
</div>

<div id="detail">
  <button id="close-detail">✕</button>
  <div id="detail-content"></div>
</div>

<script>
const STOPS = [
 {id:1,name:"Sun Bay",cat:"beach",lat:18.1057,lng:-65.4380,tag:"Main public beach"},
 {id:2,name:"Media Luna",cat:"beach",lat:18.1048,lng:-65.4313,tag:"Quiet crescent beach"},
 {id:3,name:"Navio Beach",cat:"beach",lat:18.1038,lng:-65.4246,tag:"Wild & remote"},
 {id:4,name:"Mosquito Pier",cat:"nature",lat:18.14,lng:-65.47,tag:"Snorkeling pier"},
 {id:5,name:"Bio Bay",cat:"bio",lat:18.1258,lng:-65.4648,tag:"Brightest bio bay"},
 {id:6,name:"Fortín Mirasol",cat:"history",lat:18.1516,lng:-65.4434,tag:"Spanish fort"},
 {id:7,name:"Esperanza",cat:"history",lat:18.0946,lng:-65.4714,tag:"Waterfront village"},
 {id:8,name:"Isabel Segunda",cat:"history",lat:18.1527,lng:-65.4440,tag:"Main town"},
 {id:9,name:"Home Base",cat:"home",lat:18.1579,lng:-65.4356,tag:"Your stay"}
];

const map = L.map("map",{center:[18.12,-65.45],zoom:12});
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(map);

const markers=new Map();
let selectedId=null;

function icon(stop,sel=false,b=false){
  return L.divIcon({
    className:"",
    html:`<div class="mk ${stop.cat}${sel?' sel':''}${b?' bounce':''}">${stop.cat==='home'?'🏠':stop.id}</div>`,
    iconSize:[36,36],iconAnchor:[18,18]
  });
}

STOPS.forEach(s=>{
  const m=L.marker([s.lat,s.lng],{icon:icon(s)}).addTo(map);
  m.on("click",()=>openDetail(s));
  markers.set(s.id,m);
});

function renderList(){
  const el=document.getElementById("list");
  el.innerHTML="";
  STOPS.forEach(s=>{
    const d=document.createElement("div");
    d.className="item"+(s.id===selectedId?" selected":"");
    d.innerHTML=`
      <div class="num ${s.cat}">${s.cat==='home'?'🏠':s.id}</div>
      <div>
        <div class="name">${s.name}</div>
        <div class="tag">${s.tag}</div>
      </div>`;
    d.onclick=()=>openDetail(s);
    el.appendChild(d);
  });
}

function openDetail(s){
  selectedId=s.id;
  markers.forEach((m,id)=>{
    const st=STOPS.find(x=>x.id===id);
    m.setIcon(icon(st,id===s.id,true));
  });
  setTimeout(()=>markers.get(s.id)?.setIcon(icon(s,true,false)),650);

  map.flyTo([s.lat,s.lng],13,{animate:true});
  document.getElementById("detail").classList.add("open");
  document.getElementById("detail-content").innerHTML=`
    <div class="hero">
      <div class="hero-top">
        <div class="hero-num ${s.cat}">${s.cat==='home'?'🏠':s.id}</div>
        <div>
          <div class="hero-name">${s.name}</div>
          <div class="hero-tag">${s.tag}</div>
        </div>
      </div>
    </div>
    <div class="section"><h3>Location</h3><p>${s.lat}, ${s.lng}</p></div>`;
  renderList();
}

document.getElementById("close-detail").onclick=()=>document.getElementById("detail").classList.remove("open");
document.addEventListener("click",e=>{
  const d=document.getElementById("detail");
  if(!d.classList.contains("open"))return;
  if(d.contains(e.target))return;
  d.classList.remove("open");
});

renderList();
</script>
</body>
</html>
