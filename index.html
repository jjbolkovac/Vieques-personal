<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Vieques — Trip Map (Top Picks)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--sun:#FFD93D;--coral:#FF6B6B;--ink:#102028;--muted:#5c7680;--home:#9B59B6;--beach:#0096C7;--bio:#06D6A0;--nature:#1A7A4A;--history:#E07B54;--town:#2D3436;--view:#F9A826;--rum:#6C5CE7;--log:#0077B6}
*{box-sizing:border-box} html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto}
#wrap{display:grid;grid-template-columns:390px 1fr;height:100%}
#sidebar{background:#fff;border-right:4px solid var(--sun);overflow:auto}
#map{height:100%}
header{padding:14px 16px 10px;border-bottom:1px solid #eee}
header h1{margin:0;font-size:18px}
header p{margin:6px 0 0;color:var(--muted);font-size:12px;font-weight:700;line-height:1.35}
.tabs{display:flex;gap:6px;flex-wrap:wrap;padding:10px 12px;border-bottom:1px solid #eee;background:#fff;position:sticky;top:0;z-index:5}
.tab-btn{font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:7px 10px;border-radius:999px;border:2px solid #e6e6e6;background:#fff;color:#567;cursor:pointer}
.tab-btn.on{border-color:var(--ink);background:var(--ink);color:#fff}
.subtitle{padding:10px 16px 0;color:var(--muted);font-weight:800;font-size:12px}
.list{padding:10px}
.item{display:flex;gap:10px;border:1px solid #eee;border-radius:12px;padding:10px;margin-bottom:8px;cursor:pointer;align-items:flex-start}
.item:hover{background:#f7fbff}
.item.selected{outline:3px solid rgba(0,0,0,.08)}
.num{width:32px;height:32px;min-width:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;border:3px solid #fff;box-shadow:0 6px 14px rgba(0,0,0,.18);font-size:12px;line-height:1}
.name{font-weight:900;font-size:13px;color:var(--ink)}
.tag{font-size:12px;color:var(--muted);font-weight:700;margin-top:3px}
.c-beach{background:var(--beach)}
.c-bio{background:var(--bio)}
.c-nature{background:var(--nature)}
.c-history{background:var(--history)}
.c-town{background:var(--town)}
.c-viewpoint{background:var(--view)}
.c-rum{background:var(--rum)}
.c-logistics{background:var(--log)}
.c-home{background:var(--home)}
</style>
</head>
<body>
<div id="wrap">
  <div id="sidebar">
    <header>
      <h1>Vieques — Top Picks</h1>
      <p>Accurate coordinates for beaches, bio bay, viewpoints, towns, and rum.</p>
    </header>
    <div class="tabs" id="tabs"></div>
    <div class="subtitle" id="subtitle"></div>
    <div class="list" id="list"></div>
  </div>
  <div id="map"></div>
</div>
<script>
const STOPS = [
 {id:1,name:"Bahía Bioluminiscente",cat:"bio",lat:18.10194,lng:-65.44583,tag:"World-famous glowing bay"},
 {id:2,name:"Caracas Beach",cat:"beach",lat:18.108611,lng:-65.413056,tag:"Red Beach"},
 {id:3,name:"Playa La Chiva",cat:"beach",lat:18.113056,lng:-65.3875,tag:"Blue Beach"},
 {id:4,name:"Sun Bay",cat:"beach",lat:18.09889,lng:-65.46083,tag:"Most accessible beach"},
 {id:5,name:"Black Sand Beach",cat:"beach",lat:18.09572,lng:-65.49235,tag:"Playa Negra"},
 {id:6,name:"Monte Pirata Viewpoint",cat:"viewpoint",lat:18.09306,lng:-65.55111,tag:"Highest point on Vieques"},
 {id:7,name:"Epic Sunset Palm Tree",cat:"viewpoint",lat:18.09267,lng:-65.46813,tag:"Golden-hour palms"},
 {id:8,name:"Esperanza Malecón",cat:"town",lat:18.0972,lng:-65.4708,tag:"Restaurants & sunset"},
 {id:9,name:"Isabel Segunda",cat:"town",lat:18.14913,lng:-65.44266,tag:"Main town"},
 {id:10,name:"Crab Island Rum Distillery",cat:"rum",lat:18.122055,lng:-65.525675,tag:"Local rum"}
];

const FILTERS={all:{label:"All",order:STOPS.map(s=>s.id)},bio:{label:"Bio Bay",order:STOPS.filter(s=>s.cat==='bio').map(s=>s.id)},beach:{label:"Beaches",order:STOPS.filter(s=>s.cat==='beach').map(s=>s.id)},viewpoint:{label:"Viewpoints",order:STOPS.filter(s=>s.cat==='viewpoint').map(s=>s.id)},town:{label:"Towns",order:STOPS.filter(s=>s.cat==='town').map(s=>s.id)},rum:{label:"Rum",order:STOPS.filter(s=>s.cat==='rum').map(s=>s.id)}};

let active='all';
const map=L.map('map').setView([18.11,-65.45],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
const markers=new Map();
STOPS.forEach(s=>{const m=L.marker([s.lat,s.lng]).addTo(map).bindPopup(`<strong>${s.name}</strong><br>${s.tag}`);markers.set(s.id,m);});

function renderTabs(){const t=document.getElementById('tabs');t.innerHTML='';Object.keys(FILTERS).forEach(k=>{const b=document.createElement('button');b.className='tab-btn'+(k===active?' on':'');b.textContent=FILTERS[k].label;b.onclick=()=>{active=k;renderTabs();renderList();filterMarkers();};t.appendChild(b);});}
function renderList(){const l=document.getElementById('list');l.innerHTML='';FILTERS[active].order.forEach(id=>{const s=STOPS.find(x=>x.id===id);const d=document.createElement('div');d.className='item';d.innerHTML=`<div class="num c-${s.cat}">${id}</div><div><div class="name">${s.name}</div><div class="tag">${s.tag}</div></div>`;d.onclick=()=>{map.setView([s.lat,s.lng],14);markers.get(s.id).openPopup();};l.appendChild(d);});}
function filterMarkers(){STOPS.forEach(s=>{const m=markers.get(s.id);if(active==='all'||s.cat===active){if(!map.hasLayer(m))m.addTo(map);}else{if(map.hasLayer(m))map.removeLayer(m);}});} 
renderTabs();renderList();
</script>
</body>
</html>
