<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Vieques – Island Tour (Stable)</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto}
#wrap{display:grid;grid-template-columns:340px 1fr;height:100%}
#sidebar{background:#fff;border-right:4px solid #FFD93D;overflow:auto}
#map{height:100%}

header{padding:14px 16px;border-bottom:1px solid #eee}
header h1{margin:0;font-size:18px}
header p{margin:6px 0 0;color:#5c7680;font-size:12px;font-weight:700}

.list{padding:10px}
.item{display:flex;gap:10px;border:1px solid #eee;border-radius:12px;padding:10px;margin-bottom:8px;cursor:pointer}
.item:hover{background:#f7fbff}
.item.selected{outline:3px solid rgba(0,0,0,.08)}

.num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
font-weight:900;color:#fff;border:3px solid #fff;box-shadow:0 6px 14px rgba(0,0,0,.18)}
.beach{background:#0096C7}
.nature{background:#1A7A4A}
.bio{background:#06D6A0}
.history{background:#E07B54}
.home{background:#9B59B6}

.name{font-weight:900;font-size:13px}
.tag{font-size:12px;color:#5c7680;font-weight:700}

.stop-marker{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#fff;border:3px solid #fff;
  box-shadow:0 6px 16px rgba(0,0,0,.25)
}

.m-beach{background:#0096C7}
.m-nature{background:#1A7A4A}
.m-bio{background:#06D6A0}
.m-history{background:#E07B54}

@keyframes bounce{
  0%{transform:translateY(0)}
  30%{transform:translateY(-16px)}
  50%{transform:translateY(0)}
  70%{transform:translateY(-8px)}
  100%{transform:translateY(0)}
}
.bounce{animation:bounce .6s ease}
</style>
</head>

<body>
<div id="wrap">
  <div id="sidebar">
    <header>
      <h1>Vieques – Island Tour</h1>
      <p>All destinations • numbered • stable</p>
    </header>
    <div class="list" id="list"></div>
  </div>
  <div id="map"></div>
</div>

<script>
/* ---------- DATA (EXPLICIT, NO PLACEHOLDERS) ---------- */
const STOPS = [
  {id:1,name:"Sun Bay",cat:"beach",lat:18.1057,lng:-65.4380,tag:"Main public beach"},
  {id:2,name:"Media Luna",cat:"beach",lat:18.1048,lng:-65.4313,tag:"Quiet crescent beach"},
  {id:3,name:"Navio Beach",cat:"beach",lat:18.1038,lng:-65.4246,tag:"Wild & remote"},
  {id:4,name:"Mosquito Pier",cat:"nature",lat:18.14,lng:-65.47,tag:"Snorkeling pier"},
  {id:5,name:"Bio Bay",cat:"bio",lat:18.1258,lng:-65.4648,tag:"Brightest bio bay"},
  {id:6,name:"Fortín Mirasol",cat:"history",lat:18.1516,lng:-65.4434,tag:"Spanish fort"},
  {id:7,name:"Esperanza",cat:"history",lat:18.0946,lng:-65.4714,tag:"Waterfront village"},
  {id:8,name:"Isabel Segunda",cat:"history",lat:18.1527,lng:-65.4440,tag:"Main town"},
  {id:9,name:"Home Base",cat:"home",lat:18.157917,lng:-65.435639,tag:"Your stay"}
];

const CAT_EMOJI = {
  beach:"🏖️",nature:"🌿",bio:"✨",history:"🏰",home:"🏠"
};

/* ---------- MAP ---------- */
const map = L.map("map",{center:[18.12,-65.45],zoom:12});
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  maxZoom:19,attribution:"© OpenStreetMap"
}).addTo(map);

/* ---------- MARKERS ---------- */
const markers = new Map();

STOPS.forEach(s=>{
  const icon = L.divIcon({
    className:"",
    html:`<div class="stop-marker m-${s.cat}">${s.id}</div>`,
    iconSize:[36,36],
    iconAnchor:[18,18]
  });
  const m = L.marker([s.lat,s.lng],{icon}).addTo(map);
  m.on("click",()=>{
    bounce(m,s);
    select(s.id);
  });
  markers.set(s.id,m);
});

/* ---------- LIST ---------- */
const list = document.getElementById("list");

function renderList(){
  list.innerHTML="";
  STOPS.forEach(s=>{
    const d=document.createElement("div");
    d.className="item";
    d.innerHTML=`
      <div class="num ${s.cat}">${s.id}</div>
      <div>
        <div class="name">${CAT_EMOJI[s.cat]} ${s.name}</div>
        <div class="tag">${s.tag}</div>
      </div>`;
    d.onclick=()=>{
      map.flyTo([s.lat,s.lng],13);
      bounce(markers.get(s.id),s);
      select(s.id);
    };
    list.appendChild(d);
  });
}
renderList();

/* ---------- HELPERS ---------- */
function bounce(marker,stop){
  marker.setIcon(L.divIcon({
    className:"",
    html:`<div class="stop-marker m-${stop.cat} bounce">${stop.id}</div>`,
    iconSize:[36,36],
    iconAnchor:[18,18]
  }));
  setTimeout(()=>{
    marker.setIcon(L.divIcon({
      className:"",
      html:`<div class="stop-marker m-${stop.cat}">${stop.id}</div>`,
      iconSize:[36,36],
      iconAnchor:[18,18]
    }));
  },650);
}

function select(id){
  document.querySelectorAll(".item").forEach((el,i)=>{
    el.classList.toggle("selected",STOPS[i].id===id);
  });
}
</script>
</body>
</html>
