<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Vieques — EXTREME Map + Drawer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--sun:#FFD93D;--coral:#FF6B6B;--ocean:#0096C7;--muted:#5c7680}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,Roboto}
#wrap{display:grid;grid-template-columns:320px 1fr;height:100%}
#sidebar{background:white;border-right:4px solid var(--sun);overflow:auto}
#map{height:100%}
header{padding:14px 16px;border-bottom:1px solid #eee}
.list{padding:10px}
.item{padding:10px;border:1px solid #eee;border-radius:10px;margin-bottom:8px;cursor:pointer}
.item:hover{background:#f6fbff}
.name{font-weight:900}
.tag{font-size:12px;color:var(--muted)}
#detail{position:fixed;top:0;right:0;width:380px;height:100%;background:white;transform:translateX(100%);transition:.35s ease;z-index:999;overflow:auto;box-shadow:-10px 0 30px rgba(0,0,0,.25)}
#detail.open{transform:translateX(0)}
#close-detail{position:absolute;top:14px;right:14px;border:none;background:var(--coral);color:white;width:34px;height:34px;border-radius:50%;font-weight:900}
.detail-hero{padding:16px;border-left:6px solid}
.accent-beach{border-color:#0096C7}
.accent-bio{border-color:#06D6A0}
.accent-home{border-color:#9B59B6}
.detail-name{font-size:22px;font-weight:900}
.detail-tagline{font-style:italic;color:#555}
.drive{margin-top:8px;font-size:13px;font-weight:800}
.section{padding:14px}
.section h3{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#777}
.section li{margin:6px 0}
</style>
</head>
<body>
<div id="wrap">
  <div id="sidebar">
    <header><strong>Vieques Stops</strong></header>
    <div class="list" id="list"></div>
  </div>
  <div id="map"></div>
</div>
<div id="detail">
  <button id="close-detail">✕</button>
  <div id="detail-content"></div>
</div>
<script>
const STOPS = [{"id": 1, "name": "Sun Bay (Sombé)", "cat": "beach", "lat": 18.1057, "lng": -65.438, "tagline": "The island's most beloved public beach", "desc": "Sun Bay is the crown jewel of Vieques' public beaches — a sweeping mile-long crescent of golden sand backed by sea grape trees. The calm, shallow turquoise waters make it ideal for swimming and snorkeling.", "tips": ["Arrive early on weekends", "Shade under sea grape trees", "Walk east toward Media Luna"], "hours": "7am – 6pm", "duration": "2–3 hrs", "best": "Morning"}, {"id": 2, "name": "Media Luna Beach", "cat": "beach", "lat": 18.1048, "lng": -65.4313, "tagline": "Secluded crescent with reef snorkeling", "desc": "A short walk east from Sun Bay, Media Luna offers quiet escape with excellent snorkeling off the rocky edges.", "tips": ["Bring snorkel gear", "Often empty on weekdays", "Foot access only"], "hours": "Dawn – Dusk", "duration": "1–2 hrs", "best": "Morning"}, {"id": 5, "name": "Bioluminescent Bay", "cat": "bio", "lat": 18.1258, "lng": -65.4648, "tagline": "The brightest bio bay in the world ✨", "desc": "Mosquito Bay holds the Guinness World Record as the brightest bioluminescent bay on Earth.", "tips": ["No-moon nights are best", "Kayak tours only", "No sunscreen"], "hours": "Tours from 7pm", "duration": "2 hrs", "best": "New moon"}, {"id": 19, "name": "Home Base", "cat": "home", "lat": 18.157917, "lng": -65.435639, "tagline": "Home base – June 1–6, 2026", "desc": "Your home for the week. Central, quiet, and perfectly located for exploring Vieques.", "tips": ["Stock groceries in Isabel Segunda", "Bio Bay tours depart from Esperanza"], "hours": "June 1–6", "duration": "5 nights", "best": "Always"}];
const HOME = STOPS.find(s=>s.cat==='home');
const map = L.map('map',{center:[HOME.lat,HOME.lng],zoom:13});
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19}).addTo(map);

function drive(lat,lng){
 const R=3958.8;
 const dLat=(lat-HOME.lat)*Math.PI/180;
 const dLng=(lng-HOME.lng)*Math.PI/180;
 const a=Math.sin(dLat/2)**2+Math.cos(HOME.lat*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.sin(dLng/2)**2;
 const miles=(2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
 const mins=Math.round(miles/30*60);
 return {miles,mins};
}

const detail=document.getElementById('detail');
function openDetail(s){
 const d=drive(s.lat,s.lng);
 document.getElementById('detail-content').innerHTML=`
  <div class="detail-hero accent-${s.cat}">
    <div class="detail-name">${s.name}</div>
    <div class="detail-tagline">${s.tagline}</div>
    <div class="drive">🚗 ${d.mins} min · ${d.miles} mi from Home Base</div>
  </div>
  <div class="section"><h3>About</h3><p>${s.desc}</p></div>
  <div class="section"><h3>Tips</h3><ul>${s.tips.map(t=>`<li>${t}</li>`).join('')}</ul></div>`;
 detail.classList.add('open');
}

document.getElementById('close-detail').onclick=()=>detail.classList.remove('open');

STOPS.forEach(s=>{
 const m=L.marker([s.lat,s.lng]).addTo(map);
 m.on('click',()=>openDetail(s));
});

const list=document.getElementById('list');
list.innerHTML=STOPS.map(s=>`<div class="item" onclick="openDetail(STOPS.find(x=>x.id===${s.id}))"><div class="name">${s.name}</div><div class="tag">${s.tagline}</div></div>`).join('');
</script>
</body>
</html>
