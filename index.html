<!doctype html>
<html lang="en">
<head>
 <meta charset="utf-8"/>
 <meta name="viewport" content="width=device-width,initial-scale=1"/>
 <title>Vieques — Island Tour (EXTREME + Full Details)</title>
 <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
 <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
 <style>
 :root{--sun:#FFD93D;--coral:#FF6B6B;--ocean:#0096C7;--teal:#00B4D8;--lime:#06D6A0;--ink:#102028;--muted:#5c7680}
 *{box-sizing:border-box}html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
 #wrap{display:grid;grid-template-columns:340px 1fr;height:100%}
 #sidebar{background:rgba(255,255,255,.98);border-right:4px solid var(--sun);overflow:auto}
 #map{height:100%}
 header{padding:14px 16px;border-bottom:1px solid #eee}
 header h1{margin:0;font-size:18px}
 header p{margin:6px 0 0;color:var(--muted);font-weight:600;font-size:12px}
 .home-card{margin:12px;padding:12px;border-radius:14px;border:3px solid var(--sun);background:linear-gradient(135deg,rgba(155,89,182,.12),rgba(255,217,61,.18))}
 .list{padding:8px 12px 14px}
 .item{padding:10px;border-radius:12px;border:1px solid #eee;margin:8px 0;cursor:pointer}
 .item:hover{background:#f7fbff}
 .name{font-weight:900;font-size:13px}
 .tag{font-size:12px;color:var(--muted);font-weight:700}
 /* drawer */
 #detail{position:fixed;top:0;right:0;width:380px;height:100%;background:#fff;transform:translateX(100%);transition:.35s ease;z-index:999;overflow:auto;box-shadow:-10px 0 30px rgba(0,0,0,.25)}
 #detail.open{transform:translateX(0)}
 #close-detail{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;border:none;background:var(--coral);color:#fff;font-weight:900;cursor:pointer}
 .detail-hero{padding:18px 16px;border-bottom:3px dashed #eee}
 .detail-cat{font-size:11px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
 .detail-name{font-size:22px;font-weight:900;margin:6px 0}
 .detail-tagline{font-size:14px;color:#555;font-style:italic}
 .meta{display:grid;grid-template-columns:repeat(3,1fr);margin:12px 16px;border:2px solid #f0f0f0;border-radius:12px;overflow:hidden}
 .meta div{padding:8px;font-size:12px;font-weight:800;border-right:1px solid #eee}
 .meta div:last-child{border-right:none}
 .section{padding:14px 16px}
 .section h3{margin:0 0 6px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
 .section p,.section li{font-size:14px;line-height:1.6}
 .section ul{list-style:none;padding-left:0}
 .section li{padding-left:18px;position:relative}
 .section li::before{content:'🌴';position:absolute;left:0}
 </style>
</head>
<body>
<div id="wrap">
 <div id="sidebar">
  <header><h1>Vieques — Island Tour</h1><p>EXTREME map + full stop details</p></header>
  <div class="home-card"><strong>🏠 Home Base</strong><br/>June 1–6, 2026</div>
  <div class="list" id="list"></div>
 </div>
 <div id="map"></div>
</div>

<div id="detail">
 <button id="close-detail">✕</button>
 <div id="detail-content"></div>
</div>

<script>
const CAT_COLOR={beach:'#0096C7',nature:'#1A7A4A',bio:'#06D6A0',history:'#E07B54',home:'#9B59B6'};
const HOME_BASE={id:19,name:'Home Base',cat:'home',lat:18.157917,lng:-65.435639,tagline:'Home base — June 1 to 6, 2026',desc:'Your home for the week!',tips:['Check‑in June 1','Check‑out June 6'],hours:'Jun 1–6',duration:'5 nights',best:'Always'};
const STOPS = 
[
{id:1,name:'Sun Bay (Sombé)',cat:'beach',lat:18.1057,lng:-65.4380,tagline:'The island's most beloved public beach',desc:'Sun Bay is the crown jewel...',tips:['Arrive early','Sea grape shade','Walk to Media Luna'],hours:'7am – 6pm',duration:'2–3 hrs',best:'Morning'},
{id:2,name:'Media Luna Beach',cat:'beach',lat:18.1048,lng:-65.4313,tagline:'Secluded crescent with reef snorkeling',desc:'A short walk east...',tips:['Bring snorkel','Quiet weekdays','Foot access only'],hours:'Dawn – Dusk',duration:'1–2 hrs',best:'Morning'}
]
;

const map=L.map('map',{center:[HOME_BASE.lat,HOME_BASE.lng],zoom:13});
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19}).addTo(map);
let justOpened=false;
const detail=document.getElementById('detail');
function openDetail(s){justOpened=true;setTimeout(()=>justOpened=false,0);
document.getElementById('detail-content').innerHTML=`
 <div class='detail-hero'>
  <div class='detail-cat'>${s.cat}</div>
  <div class='detail-name'>${s.name}</div>
  <div class='detail-tagline'>${s.tagline}</div>
 </div>
 <div class='meta'>
  <div>${s.duration}</div><div>${s.best}</div><div>${s.hours}</div>
 </div>
 <div class='section'><h3>About</h3><p>${s.desc}</p></div>
 <div class='section'><h3>Local Tips</h3><ul>${s.tips.map(t=>`<li>${t}</li>`).join('')}</ul></div>`;
detail.classList.add('open')}
function closeDetail(){detail.classList.remove('open')}
document.getElementById('close-detail').onclick=closeDetail;
document.addEventListener('click',e=>{if(!detail.classList.contains('open'))return;if(justOpened)return;if(detail.contains(e.target))return;closeDetail()});
STOPS.forEach(s=>{const m=L.marker([s.lat,s.lng]).addTo(map);m.on('click',()=>openDetail(s))});
const list=document.getElementById('list');
list.innerHTML=STOPS.map(s=>`<div class='item' onclick='openDetail(STOPS.find(x=>x.id===${s.id}))'><div class='name'>${s.name}</div><div class='tag'>${s.tagline}</div></div>`).join('');
</script>
</body>
</html>
