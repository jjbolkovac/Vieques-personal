<!doctype html>
<html lang="en">
<head>
 <meta charset="utf-8"/>
 <meta name="viewport" content="width=device-width,initial-scale=1"/>
 <title>Vieques — Island Tour (Home Base Highlighted)</title>
 <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
 <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
 <style>
 :root { --sun:#FFD93D; --coral:#FF6B6B; --ocean:#0096C7; --ink:#102028; --muted:#5c7680; }
 *{box-sizing:border-box} html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}
 #wrap{display:grid;grid-template-columns:340px 1fr;height:100%;}
 #sidebar{background:rgba(255,255,255,.98);border-right:4px solid var(--sun);overflow:auto;}
 #map{height:100%;}
 /* RIGHT DRAWER */
 #detail{position:fixed;top:0;right:0;width:360px;height:100%;background:#fff;box-shadow:-8px 0 30px rgba(0,0,0,.25);transform:translateX(100%);transition:transform .35s ease;z-index:999;overflow:auto}
 #detail.open{transform:translateX(0)}
 #detail header{padding:16px;border-bottom:1px solid #eee;font-weight:900}
 #close-detail{position:absolute;top:14px;right:14px;border:none;background:var(--coral);color:#fff;width:32px;height:32px;border-radius:50%;font-weight:900;cursor:pointer}
 #detail .content{padding:16px;font-size:14px;line-height:1.5}
 </style>
</head>
<body>
 <div id="wrap">
  <div id="sidebar">
   <header><h1>Vieques — Island Tour</h1><p>Home Base is highlighted.</p></header>
   <div class="list" id="list"></div>
  </div>
  <div id="map"></div>
 </div>

 <div id="detail">
  <button id="close-detail">✕</button>
  <header id="detail-title">Stop</header>
  <div class="content" id="detail-content"></div>
 </div>

 <script>
 const STOPS = [
  {id:1,name:'Sun Bay (Sombé)',lat:18.1057,lng:-65.438,tagline:'Beloved beach'},
  {id:2,name:'Media Luna Beach',lat:18.1048,lng:-65.4313,tagline:'Secluded snorkeling'},
  {id:19,name:'Home Base',lat:18.157917,lng:-65.435639,tagline:'June 1–6, 2026'}
 ];

 const map = L.map('map',{center:[18.157917,-65.435639],zoom:13});
 L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19}).addTo(map);

 let justOpened=false;
 const detail=document.getElementById('detail');
 const title=document.getElementById('detail-title');
 const content=document.getElementById('detail-content');

 function openDetail(s){
  justOpened=true;
  setTimeout(()=>justOpened=false,0);
  title.textContent=s.name;
  content.innerHTML=`<p>${s.tagline}</p><p>${s.lat}, ${s.lng}</p>`;
  detail.classList.add('open');
 }
 function closeDetail(){detail.classList.remove('open')}
 document.getElementById('close-detail').onclick=closeDetail;
 document.addEventListener('click',e=>{
  if(!detail.classList.contains('open'))return;
  if(justOpened)return;
  if(detail.contains(e.target))return;
  closeDetail();
 });

 STOPS.forEach(s=>{
  const m=L.marker([s.lat,s.lng]).addTo(map);
  m.on('click',()=>openDetail(s));
 });
 </script>
</body>
</html>
