<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Vieques — EXTREME Map + Full Stops</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
  --sun:#FFD93D; --coral:#FF6B6B;
  --beach:#0096C7; --nature:#1A7A4A;
  --bio:#06D6A0; --history:#E07B54; --home:#9B59B6;
  --muted:#5c7680;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto}

#wrap{display:grid;grid-template-columns:340px 1fr;height:100%}
#sidebar{background:#fff;border-right:4px solid var(--sun);overflow:auto}
#map{height:100%}

header{padding:14px 16px;border-bottom:1px solid #eee}
.list{padding:10px}
.item{padding:10px;border:1px solid #eee;border-radius:10px;margin-bottom:8px;cursor:pointer}
.item:hover{background:#f6fbff}
.name{font-weight:900}
.tag{font-size:12px;color:var(--muted)}

#detail{
  position:fixed;top:0;right:0;width:390px;height:100%;
  background:#fff;transform:translateX(100%);
  transition:.35s ease;z-index:999;overflow:auto;
  box-shadow:-10px 0 30px rgba(0,0,0,.25)
}
#detail.open{transform:translateX(0)}
#close-detail{
  position:absolute;top:14px;right:14px;
  border:none;background:var(--coral);color:#fff;
  width:34px;height:34px;border-radius:50%;font-weight:900
}

.detail-hero{padding:16px;border-left:6px solid}
.accent-beach{border-color:var(--beach)}
.accent-nature{border-color:var(--nature)}
.accent-bio{border-color:var(--bio)}
.accent-history{border-color:var(--history)}
.accent-home{border-color:var(--home)}

.detail-name{font-size:22px;font-weight:900}
.detail-tagline{font-style:italic;color:#555}
.drive{margin-top:8px;font-size:13px;font-weight:800}

.section{padding:14px}
.section h3{
  font-size:11px;letter-spacing:.15em;
  text-transform:uppercase;color:#777
}
.section li{margin:6px 0}
</style>
</head>

<body>
<div id="wrap">
  <div id="sidebar">
    <header><strong>Vieques Stops (19)</strong></header>
    <div class="list" id="list"></div>
  </div>
  <div id="map"></div>
</div>

<div id="detail">
  <button id="close-detail">✕</button>
  <div id="detail-content"></div>
</div>

<script>
const STOPS = [
  {id:1,name:"Sun Bay (Sombé)",cat:"beach",lat:18.1057,lng:-65.4380,
   tagline:"The island's most beloved public beach",
   desc:"Sun Bay is the crown jewel of Vieques' public beaches.",
   tips:["Arrive early","Sea grape shade","Walk to Media Luna"]},

  {id:2,name:"Media Luna Beach",cat:"beach",lat:18.1048,lng:-65.4313,
   tagline:"Secluded crescent with reef snorkeling",
   desc:"A quiet crescent just east of Sun Bay.",
   tips:["Bring snorkel gear","Often empty weekdays"]},

  {id:3,name:"Navio Beach",cat:"beach",lat:18.1038,lng:-65.4246,
   tagline:"Wild & remote Atlantic-facing beach",
   desc:"Remote, dramatic, and undeveloped.",
   tips:["4WD recommended","Strong surf"]},

  {id:4,name:"Mosquito Pier",cat:"nature",lat:18.1400,lng:-65.4700,
   tagline:"Snorkeling & historic Navy pier",
   desc:"One of the island’s best snorkel spots.",
   tips:["Morning visibility","Sunset photos"]},

  {id:5,name:"Bioluminescent Bay",cat:"bio",lat:18.1258,lng:-65.4648,
   tagline:"The brightest bio bay in the world ✨",
   desc:"Guinness World Record bioluminescence.",
   tips:["No-moon nights","No sunscreen"]},

  {id:6,name:"El Fortín Conde de Mirasol",cat:"history",lat:18.1516,lng:-65.4434,
   tagline:"Last Spanish fort in the Americas",
   desc:"Historic fort and museum.",
   tips:["Panoramic views","Museum exhibits"]},

  {id:7,name:"Isabel Segunda",cat:"history",lat:18.1527,lng:-65.4440,
   tagline:"Vieques’ colorful main town",
   desc:"Island hub near ferry terminal.",
   tips:["Plaza market","Restaurants"]},

  {id:8,name:"Esperanza Malecón",cat:"history",lat:18.0946,lng:-65.4714,
   tagline:"Southern waterfront village",
   desc:"Restaurants and sunsets.",
   tips:["Sunset walk","Seafood"]},

  {id:9,name:"Vieques Wildlife Refuge",cat:"nature",lat:18.1100,lng:-65.3900,
   tagline:"3,100 acres of protected land",
   desc:"Beaches, trails, wildlife.",
   tips:["4WD required","Bird watching"]},

  {id:10,name:"Red Beach (Caracas)",cat:"beach",lat:18.1100,lng:-65.4200,
   tagline:"Iconic calm bay",
   desc:"Crystal clear water.",
   tips:["Snorkeling","No facilities"]},

  {id:11,name:"Blue Beach (La Chiva)",cat:"beach",lat:18.1050,lng:-65.4050,
   tagline:"Seven coves of blue water",
   desc:"Often called the island’s best beach.",
   tips:["Explore coves","Morning visit"]},

  {id:12,name:"Green Beach",cat:"beach",lat:18.1320,lng:-65.5190,
   tagline:"Remote western tip",
   desc:"Views toward mainland PR.",
   tips:["Sunset","Very isolated"]},

  {id:13,name:"Playa Negra",cat:"beach",lat:18.1490,lng:-65.4550,
   tagline:"Black sand beach",
   desc:"Unusual volcanic sand.",
   tips:["Photography"]},

  {id:14,name:"Punta Mulas Lighthouse",cat:"history",lat:18.1562,lng:-65.4442,
   tagline:"Historic lighthouse",
   desc:"Near ferry terminal.",
   tips:["Golden hour"]},

  {id:15,name:"La Laguna (Kiani Lagoon)",cat:"nature",lat:18.1030,lng:-65.4720,
   tagline:"Mangrove lagoon kayaking",
   desc:"Quiet kayaking spot.",
   tips:["Dawn paddling"]},

  {id:16,name:"Cerro Ventana",cat:"nature",lat:18.1350,lng:-65.4600,
   tagline:"Natural rock window",
   desc:"Hike with panoramic views.",
   tips:["Bring water"]},

  {id:17,name:"Taíno Cultural Site",cat:"history",lat:18.1200,lng:-65.4900,
   tagline:"Pre‑Columbian heritage",
   desc:"Taíno artifacts and history.",
   tips:["Museum visit"]},

  {id:18,name:"Playa La Plata",cat:"beach",lat:18.1080,lng:-65.4600,
   tagline:"Best‑kept secret beach",
   desc:"Hidden and beautiful.",
   tips:["4WD required"]},

  {id:19,name:"Home Base",cat:"home",lat:18.157917,lng:-65.435639,
   tagline:"Home base – June 1–6, 2026",
   desc:"Your home for the week.",
   tips:["Groceries in town","Central location"]}
];

const HOME = STOPS.find(s=>s.cat==="home");

const map = L.map("map",{center:[HOME.lat,HOME.lng],zoom:13});
L.tileLayer(
 "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
 {maxZoom:19}
).addTo(map);

function drive(lat,lng){
 const R=3958.8;
 const dLat=(lat-HOME.lat)*Math.PI/180;
 const dLng=(lng-HOME.lng)*Math.PI/180;
 const a=Math.sin(dLat/2)**2+
   Math.cos(HOME.lat*Math.PI/180)*Math.cos(lat*Math.PI/180)*
   Math.sin(dLng/2)**2;
 const miles=(2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
 return {miles,mins:Math.round(miles/30*60)};
}

const detail=document.getElementById("detail");

function openDetail(s){
 const d=drive(s.lat,s.lng);
 document.getElementById("detail-content").innerHTML=`
  <div class="detail-hero accent-${s.cat}">
    <div class="detail-name">${s.name}</div>
    <div class="detail-tagline">${s.tagline}</div>
    <div class="drive">🚗 ${d.mins} min · ${d.miles} mi from Home Base</div>
  </div>
  <div class="section"><h3>About</h3><p>${s.desc}</p></div>
  <div class="section"><h3>Tips</h3><ul>${s.tips.map(t=>`<li>${t}</li>`).join("")}</ul></div>
 `;
 detail.classList.add("open");
}

document.getElementById("close-detail").onclick=()=>detail.classList.remove("open");

STOPS.forEach(s=>{
 const m=L.marker([s.lat,s.lng]).addTo(map);
 m.on("click",()=>openDetail(s));
});

document.getElementById("list").innerHTML =
 STOPS.map(s=>`
  <div class="item" onclick="openDetail(STOPS.find(x=>x.id===${s.id}))">
    <div class="name">${s.name}</div>
    <div class="tag">${s.tagline}</div>
  </div>`).join("");
</script>
</body>
</html>
